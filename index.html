<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lumina</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <!-- Meta tags for better SEO and social media sharing -->
    <meta name="description" content="Lumina - An immersive journey into consciousness.">
    <meta property="og:title" content="Lumina">
    <meta property="og:description" content="An immersive journey into consciousness.">
    <meta property="og:image" content="images/og-image.jpg">
    <!-- Preconnects for performance optimization -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Favicon and icons -->
    <link rel="icon" href="favicons/favicon.ico" type="image/x-icon">
    <!-- Updated font with variable weights for better typography -->
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@200..900&display=swap" rel="stylesheet">
    <!-- Updated CSS file -->
    <link rel="stylesheet" href="css/style.css">
    <!-- Security headers -->
    <meta http-equiv="Content-Security-Policy" content="
        default-src 'self';
        script-src 'self' https://cdnjs.cloudflare.com https://unpkg.com;
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
        img-src 'self' data: https:;
        font-src 'self' https://fonts.gstatic.com data:;
        connect-src 'self';
        frame-ancestors 'none';
    ">
</head>
<body>
    <!-- Preloader with enhanced animation -->
    <div id="preloader">
        <div class="loader">
            <div class="inner-loader"></div>
        </div>
    </div>
    <!-- Enhanced background with shaders -->
    <canvas id="background"></canvas>
    <main>
        <div class="entrance">
            <h1>Lumina</h1>
            <form id="login-form">
                <div class="input-container">
                    <input type="text" name="username" placeholder="Username" required autocomplete="off">
                </div>
                <div class="input-container">
                    <div class="custom-select">
                        <select name="domain" required>
                            <option value="" disabled selected>Select Domain</option>
                            <option value="@ko.vc">@ko.vc</option>
                            <option value="@yv.is">@yv.is</option>
                        </select>
                    </div>
                </div>
                <button type="submit">Enter</button>
            </form>
        </div>
    </main>
    <!-- Noscript fallback -->
    <noscript>
        <style>
            #preloader, #background {
                display: none;
            }
            body {
                background-color: #0a0a0a;
                color: #e0e0e0;
                font-family: 'Urbanist', sans-serif;
            }
            .entrance {
                opacity: 1;
                animation: none;
                padding-top: 100px;
            }
        </style>
        <main>
            <div class="entrance">
                <h1>Lumina</h1>
                <p>Welcome to Lumina. Please enable JavaScript to experience the full site features.</p>
                <form action="https://accounts.google.com/AccountChooser" method="get">
                    <div class="input-container">
                        <input type="text" name="Email" placeholder="Username" required>
                    </div>
                    <div class="input-container">
                        <div class="custom-select">
                            <select name="domain" required>
                                <option value="" disabled selected>Select Domain</option>
                                <option value="@ko.vc">@ko.vc</option>
                                <option value="@yv.is">@yv.is</option>
                            </select>
                        </div>
                    </div>
                    <input type="hidden" name="continue" value="https://mail.google.com/a/">
                    <button type="submit">Enter</button>
                </form>
            </div>
        </main>
    </noscript>
    <!-- Updated scripts with additional libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js" defer></script>
    <script src="https://unpkg.com/glslify@7.1.1/dist/glslify.min.js" defer></script>
    <script src="js/script.js" defer></script>
</body>
</html>
