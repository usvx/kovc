<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0a0a0a">
    <meta http-equiv="Content-Security-Policy" content="
        default-src 'self';
        img-src 'self' data:;
        font-src 'self' https://fonts.gstatic.com;
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
        script-src 'self' 'unsafe-inline';
        form-action 'self' https://accounts.google.com;
        object-src 'none';
        frame-ancestors 'none';
        upgrade-insecure-requests;
    ">
    <meta name="referrer" content="no-referrer">
    <meta name="color-scheme" content="dark">
    
    <link rel="icon" href="favicons/favicon.ico" type="image/x-icon">
    <link rel="apple-touch-icon" sizes="180x180" href="favicons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicons/favicon-16x16.png">
    <link rel="manifest" href="favicons/site.webmanifest">
    <link rel="mask-icon" href="favicons/safari-pinned-tab.svg" color="#5bbad5">
    
    <link rel="stylesheet" href="css/style.css">
    <title>Cipher Access Portal</title>
</head>
<body>
    <canvas id="background"></canvas>
    <main aria-labelledby="cipher-access-title">
        <div class="entrance">
            <h1 id="cipher-access-title">Cipher Access</h1>
            <form id="login-form" aria-label="Login Form">
                <div class="input-container">
                    <input type="text" name="username" placeholder="Username" aria-required="true" required>
                    <span aria-hidden="true">@ko.vc</span>
                </div>
                <button type="submit">Enter</button>
            </form>
        </div>
    </main>
    <script src="js/script.js"></script>
</body>
</html>
