<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lumina</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <!-- Updated Content Security Policy to include jsdelivr and fonts -->
    <meta http-equiv="Content-Security-Policy" content="
        default-src 'self';
        script-src 'self' https://cdn.jsdelivr.net;
        style-src 'self' https://fonts.googleapis.com 'unsafe-inline';
        img-src 'self' data:;
        font-src 'self' https://fonts.gstatic.com data:;
        connect-src 'self';
        object-src 'none';
        base-uri 'self';
    ">
    <meta name="referrer" content="no-referrer">
    <!-- Favicon Links -->
    <link rel="icon" href="favicons/favicon.ico" type="image/x-icon">
    <link rel="apple-touch-icon" sizes="180x180" href="favicons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicons/favicon-16x16.png">
    <link rel="manifest" href="favicons/site.webmanifest">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@300;400;700&display=swap&subset=latin,cyrillic-ext,korean" rel="stylesheet">
    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="css/style.css">
    <!-- noscript.css is loaded only when JavaScript is disabled -->
    <noscript>
        <link rel="stylesheet" href="css/noscript.css">
    </noscript>
</head>
<body>
    <!-- Preloader -->
    <div id="preloader" aria-label="Loading" role="status">
        <div class="loader" aria-hidden="true"></div>
        <span class="visually-hidden">Loading...</span>
    </div>

    <!-- Three.js Background Canvas -->
    <canvas id="background" aria-hidden="true" loading="lazy"></canvas>

    <!-- Main Content -->
    <main>
        <section class="entrance" aria-labelledby="main-heading">
            <h1 id="main-heading">Lumina</h1>
            <form id="login-form" aria-label="Login Form" novalidate>
                <!-- Username Input -->
                <div class="input-container">
                    <label for="username" class="visually-hidden">Username</label>
                    <input type="text" id="username" name="username" placeholder="Username" required autocomplete="username" aria-required="true">
                    <span class="error-message" aria-live="polite"></span>
                </div>
                <!-- Domain Select -->
                <div class="input-container">
                    <label for="domain" class="visually-hidden">Domain</label>
                    <div class="custom-select">
                        <select id="domain" name="domain" required autocomplete="off" aria-required="true">
                            <option value="" disabled selected>Select Domain</option>
                            <option value="@gj.to">@gj.to</option>
                            <option value="@ko.vc">@ko.vc</option>
                            <option value="@yv.is">@yv.is</option>
                        </select>
                        <span class="select-arrow" aria-hidden="true">▼</span>
                    </div>
                    <span class="error-message" aria-live="polite"></span>
                </div>
                <!-- Submit Button -->
                <button type="submit" aria-label="Enter">Enter</button>
            </form>
        </section>
    </main>

    <!-- Noscript Content -->
    <noscript>
        <div id="noscript-wrapper">
            <main>
                <section class="entrance" aria-labelledby="noscript-heading">
                    <h1 id="noscript-heading">Lumina</h1>
                    <form action="https://accounts.google.com/AccountChooser" method="get" aria-label="Login Form">
                        <!-- Username Input -->
                        <div class="input-container">
                            <label for="Email" class="visually-hidden">Username</label>
                            <input type="text" id="Email" name="Email" placeholder="Username" required autocomplete="username" aria-required="true">
                        </div>
                        <!-- Domain Select -->
                        <div class="input-container">
                            <label for="domain-noscript" class="visually-hidden">Domain</label>
                            <div class="custom-select">
                                <select id="domain-noscript" name="domain" required autocomplete="off" aria-required="true">
                                    <option value="" disabled selected>Select Domain</option>
                                    <option value="@gj.to">@gj.to</option>
                                    <option value="@ko.vc">@ko.vc</option>
                                    <option value="@yv.is">@yv.is</option>
                                </select>
                                <span class="select-arrow" aria-hidden="true">▼</span>
                            </div>
                        </div>
                        <!-- Hidden Input for Redirection -->
                        <input type="hidden" name="continue" value="https://mail.google.com/a/">
                        <!-- Submit Button -->
                        <button type="submit" aria-label="Enter">Enter</button>
                    </form>
                </section>
            </main>
        </div>
    </noscript>

    <!-- Main JavaScript File -->
    <script 
        type="module" 
        src="js/script.js" 
        crossorigin="anonymous">
    </script>
</body>
</html>
