<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lumina</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <!-- Enhanced Content Security Policy -->
    <meta http-equiv="Content-Security-Policy" content="
        default-src 'self';
        script-src 'self' https://cdn.jsdelivr.net 'unsafe-eval';
        style-src 'self' https://fonts.googleapis.com 'unsafe-inline';
        img-src 'self' data:;
        font-src 'self' https://fonts.gstatic.com data:;
        connect-src 'self';
        object-src 'none';
        base-uri 'self';
    ">
    <meta name="referrer" content="no-referrer">
    <link rel="icon" href="favicons/favicon.ico" type="image/x-icon">
    <link rel="apple-touch-icon" sizes="180x180" href="favicons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicons/favicon-16x16.png">
    <link rel="manifest" href="favicons/site.webmanifest">
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@300;400;700&display=swap&subset=latin,cyrillic-ext,korean" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <noscript>
        <link rel="stylesheet" href="css/noscript.css">
    </noscript>
    <!-- Dark Mode Toggle -->
    <script>
        // Detect user preference for dark mode
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.documentElement.classList.toggle('dark-mode', prefersDark);
    </script>
</head>
<body>
    <button id="theme-toggle" aria-label="Toggle Dark Mode">
        <svg id="theme-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <!-- Sun Icon -->
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
    </button>

    <div id="preloader" aria-label="Loading">
        <div class="loader"></div>
    </div>
    <canvas id="background" aria-hidden="true" loading="lazy"></canvas>
    <main>
        <section class="entrance" role="main">
            <h1>Lumina</h1>
            <form id="login-form" aria-label="Login Form" novalidate>
                <div class="input-group">
                    <label for="username" class="visually-hidden">Username</label>
                    <input type="text" id="username" name="username" placeholder="Username" required autocomplete="username" aria-required="true">
                </div>
                <div class="input-group">
                    <label for="domain" class="visually-hidden">Domain</label>
                    <div class="custom-select">
                        <select id="domain" name="domain" required autocomplete="off" aria-required="true">
                            <option value="" disabled selected>Select Domain</option>
                            <option value="@gj.to">@gj.to</option>
                            <option value="@ko.vc">@ko.vc</option>
                            <option value="@yv.is">@yv.is</option>
                        </select>
                    </div>
                </div>
                <button type="submit" aria-label="Enter">Enter</button>
            </form>
        </section>
    </main>
    <noscript>
        <div id="noscript-wrapper">
            <main>
                <section class="entrance">
                    <h1>Lumina</h1>
                    <form action="https://accounts.google.com/AccountChooser" method="get" aria-label="Login Form">
                        <div class="input-group">
                            <label for="Email" class="visually-hidden">Username</label>
                            <input type="text" id="Email" name="Email" placeholder="Username" required autocomplete="username" aria-required="true">
                        </div>
                        <div class="input-group">
                            <label for="domain-noscript" class="visually-hidden">Domain</label>
                            <div class="custom-select">
                                <select id="domain-noscript" name="domain" required autocomplete="off" aria-required="true">
                                    <option value="" disabled selected>Select Domain</option>
                                    <option value="@gj.to">@gj.to</option>
                                    <option value="@ko.vc">@ko.vc</option>
                                    <option value="@yv.is">@yv.is</option>
                                </select>
                            </div>
                        </div>
                        <input type="hidden" name="continue" value="https://mail.google.com/a/">
                        <button type="submit" aria-label="Enter">Enter</button>
                    </form>
                </section>
            </main>
        </div>
    </noscript>
    <!-- Defer non-critical scripts -->
    <script type="module" src="js/script.js" defer crossorigin="anonymous"></script>
    <!-- Theme Toggle Script -->
    <script>
        const themeToggle = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');

        themeToggle.addEventListener('click', () => {
            document.documentElement.classList.toggle('dark-mode');
            if (document.documentElement.classList.contains('dark-mode')) {
                themeIcon.innerHTML = `
                    <path d="M12 3v1"></path>
                    <path d="M12 20v1"></path>
                    <path d="M4.22 4.22l.7.7"></path>
                    <path d="M18.36 18.36l.7.7"></path>
                    <path d="M1 12h1"></path>
                    <path d="M20 12h1"></path>
                    <path d="M4.22 19.78l.7-.7"></path>
                    <path d="M18.36 5.64l.7-.7"></path>
                    <circle cx="12" cy="12" r="5" fill="none" stroke="currentColor" stroke-width="2"></circle>
                `;
            } else {
                themeIcon.innerHTML = `
                    <circle cx="12" cy="12" r="5"></circle>
                    <line x1="12" y1="1" x2="12" y2="3"></line>
                    <line x1="12" y1="21" x2="12" y2="23"></line>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                    <line x1="1" y1="12" x2="3" y2="12"></line>
                    <line x1="21" y1="12" x2="23" y2="12"></line>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                `;
            }
        });
    </script>
</body>
</html>
